<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>회복 타이머</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&family=Nunito:wght@400;700;800&display=swap');

:root {
  --stand-c: #ff6b9d;
  --stand-c2: #ff9a56;
  --stand-bg: #fff5f0;
  --sit-c: #f0932b;
  --sit-c2: #f9ca24;
  --sit-bg: #fffbf0;
  --rest-c: #5b7fff;
  --rest-c2: #56cfff;
  --rest-bg: #f0f5ff;
  --bg: #fafafa;
  --text: #2d2d3a;
  --text-dim: #9b9baf;
  --border: #ededf5;
  --shadow: rgba(120,120,180,0.1);
  --radius: 24px;
  --radius-sm: 14px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; padding: 24px 16px 60px;
  transition: background 0.6s ease;
  overflow-x: hidden;
}
body.standing { background: var(--stand-bg); }
body.sitting { background: var(--sit-bg); }
body.resting { background: var(--rest-bg); }
.blob {
  position: fixed; border-radius: 50%; filter: blur(70px);
  opacity: 0.3; pointer-events: none; z-index: 0;
}
.blob-1 { width: 280px; height: 280px; top: -80px; right: -60px;
  background: radial-gradient(circle, #ffb3c6, #ffd6a5); }
.blob-2 { width: 220px; height: 220px; bottom: -40px; left: -40px;
  background: radial-gradient(circle, #a0d8ef, #c3b1e1); }
.container {
  position: relative; z-index: 1;
  max-width: 420px; margin: 0 auto;
  display: flex; flex-direction: column; gap: 16px;
}
.header { display: flex; align-items: center; justify-content: space-between; padding: 4px; }
.day-counter {
  font-family: 'Nunito', sans-serif;
  font-size: 20px; font-weight: 800;
  background: linear-gradient(135deg, #ff6b9d, #5b7fff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.header-date { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
.status-card {
  background: white; border-radius: var(--radius);
  padding: 28px 20px; box-shadow: 0 4px 20px var(--shadow);
  text-align: center; position: relative; overflow: hidden;
}
.status-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: #ddd; transition: background 0.5s;
}
body.standing .status-card::before { background: linear-gradient(90deg, var(--stand-c2), var(--stand-c)); }
body.sitting .status-card::before { background: linear-gradient(90deg, var(--sit-c2), var(--sit-c)); }
body.resting .status-card::before { background: linear-gradient(90deg, var(--rest-c2), var(--rest-c)); }
.status-emoji { font-size: 44px; margin-bottom: 8px; line-height: 1; }
.status-label { font-size: 13px; color: var(--text-dim); font-weight: 600; letter-spacing: 1px; margin-bottom: 4px; }
.status-name { font-size: 22px; font-weight: 700; margin-bottom: 16px; }
body.standing .status-name { color: var(--stand-c); }
body.sitting .status-name { color: var(--sit-c); }
body.resting .status-name { color: var(--rest-c); }
.timer-display {
  font-family: 'Nunito', sans-serif;
  font-size: 56px; font-weight: 800;
  letter-spacing: -2px; line-height: 1; margin-bottom: 6px;
}
body.standing .timer-display { color: var(--stand-c); }
body.sitting .timer-display { color: var(--sit-c); }
body.resting .timer-display { color: var(--rest-c); }
.timer-sub { font-size: 13px; color: var(--text-dim); margin-bottom: 16px; }
.timer-sub.over { color: #e53e3e; font-weight: 600; }
.progress-bar {
  width: 100%; height: 6px; background: var(--border);
  border-radius: 100px; overflow: hidden; margin-bottom: 16px;
}
.progress-fill { height: 100%; border-radius: 100px;
  transition: width 1s linear, background 0.5s; background: #ddd; }
body.standing .progress-fill { background: linear-gradient(90deg, var(--stand-c2), var(--stand-c)); }
body.sitting .progress-fill { background: linear-gradient(90deg, var(--sit-c2), var(--sit-c)); }
body.resting .progress-fill { background: linear-gradient(90deg, var(--rest-c2), var(--rest-c)); }
.progress-fill.over { background: linear-gradient(90deg, #ff6b6b, #e53e3e) !important; }
.action-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.action-btn {
  padding: 18px 8px; border-radius: var(--radius-sm);
  border: 2px solid var(--border); background: white;
  cursor: pointer; display: flex; flex-direction: column;
  align-items: center; gap: 6px;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 700; font-size: 14px; color: var(--text-dim);
  transition: all 0.2s; touch-action: manipulation;
}
.action-btn:active { transform: scale(0.96); }
.action-btn.active-stand { background: linear-gradient(135deg, var(--stand-c2), var(--stand-c)); color: white; border-color: transparent; box-shadow: 0 4px 16px rgba(255,107,157,0.35); }
.action-btn.active-sit { background: linear-gradient(135deg, var(--sit-c2), var(--sit-c)); color: white; border-color: transparent; box-shadow: 0 4px 16px rgba(240,147,43,0.35); }
.action-btn.active-rest { background: linear-gradient(135deg, var(--rest-c2), var(--rest-c)); color: white; border-color: transparent; box-shadow: 0 4px 16px rgba(91,127,255,0.35); }
.action-emoji { font-size: 24px; line-height: 1; }
.action-name { font-size: 13px; }
.stop-btn {
  width: 100%; padding: 14px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: white; color: var(--text-dim);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px; font-weight: 600;
  cursor: pointer; touch-action: manipulation; transition: all 0.2s;
}
.stop-btn:active { transform: scale(0.98); background: #f5f5fa; }
.stop-btn:disabled { opacity: 0.4; }
.today-card, .history-card {
  background: white; border-radius: var(--radius);
  padding: 20px; box-shadow: 0 4px 20px var(--shadow);
}
.card-title {
  font-family: 'Nunito', sans-serif;
  font-size: 14px; font-weight: 800; color: var(--text);
  margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between;
}
.card-title-sub { font-size: 11px; color: var(--text-dim); font-weight: 500; }
.today-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 0; border-bottom: 1px solid #f5f5fa;
}
.today-row:last-child { border-bottom: none; }
.today-row-left { display: flex; align-items: center; gap: 12px; }
.today-row-emoji {
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center; font-size: 18px;
}
.row-stand { background: linear-gradient(135deg, #ffe5ec, #ffe9c8); }
.row-sit { background: linear-gradient(135deg, #fff8e1, #ffe0b2); }
.row-rest { background: linear-gradient(135deg, #e3f2fd, #e8eaff); }
.today-row-name { font-size: 14px; font-weight: 600; }
.today-row-detail { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.today-row-time {
  font-family: 'Nunito', sans-serif;
  font-size: 18px; font-weight: 800;
}
.history-list {
  display: flex; flex-direction: column; gap: 10px;
  max-height: 320px; overflow-y: auto;
}
.history-empty { text-align: center; color: var(--text-dim); font-size: 13px; padding: 20px 0; }
.history-day { background: #f9f9fc; border-radius: 12px; padding: 12px 14px; }
.history-day-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
.history-day-date { font-size: 13px; font-weight: 700; }
.history-day-cycles { font-size: 11px; color: var(--text-dim); }
.history-day-bars {
  display: flex; height: 8px; border-radius: 100px; overflow: hidden;
  background: #ededf5; margin-bottom: 6px;
}
.bar-stand { background: linear-gradient(90deg, var(--stand-c2), var(--stand-c)); }
.bar-sit { background: linear-gradient(90deg, var(--sit-c2), var(--sit-c)); }
.bar-rest { background: linear-gradient(90deg, var(--rest-c2), var(--rest-c)); }
.history-day-times { display: flex; justify-content: space-between; font-size: 11px; }
.t-stand { color: var(--stand-c); font-weight: 600; }
.t-sit { color: var(--sit-c); font-weight: 600; }
.t-rest { color: var(--rest-c); font-weight: 600; }
.alert {
  position: fixed; top: 16px; left: 16px; right: 16px;
  background: white; padding: 16px 20px;
  border-radius: var(--radius-sm); box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  z-index: 100; transform: translateY(-200px);
  transition: transform 0.4s ease;
  display: flex; align-items: center; gap: 12px;
  border-left: 4px solid #ddd; max-width: 420px; margin: 0 auto;
}
.alert.show { transform: translateY(0); }
.alert.stand { border-left-color: var(--stand-c); }
.alert.sit { border-left-color: var(--sit-c); }
.alert.rest { border-left-color: var(--rest-c); }
.alert-emoji { font-size: 28px; }
.alert-text { flex: 1; }
.alert-title { font-size: 14px; font-weight: 700; }
.alert-sub { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
.alert-close {
  width: 28px; height: 28px; border: none; background: #f5f5fa;
  border-radius: 50%; cursor: pointer; font-size: 14px; touch-action: manipulation;
}
.limit-info {
  font-size: 11px; color: var(--text-dim);
  text-align: center; margin-top: 8px; font-weight: 500;
}
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: rgba(40,40,60,0.95); color: white;
  padding: 12px 24px; border-radius: 100px;
  font-size: 13px; font-weight: 500; z-index: 99;
  transition: transform 0.3s;
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="container">
  <div class="header">
    <div>
      <div class="day-counter" id="dayCounter">🌿 수술 후 50일째</div>
      <div class="header-date" id="dateText">오늘</div>
    </div>
  </div>

  <div class="status-card">
    <div class="status-emoji" id="statusEmoji">⏸</div>
    <div class="status-label">현재 상태</div>
    <div class="status-name" id="statusName">대기 중</div>
    <div class="timer-display" id="timerDisplay">00:00</div>
    <div class="timer-sub" id="timerSub">활동을 선택해주세요</div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="limit-info" id="limitInfo">서기 20분 · 앉기 30분 · 휴식 60분</div>
  </div>

  <div class="action-grid">
    <button class="action-btn" id="btnStand"><div class="action-emoji">🏃</div><div class="action-name">서기</div></button>
    <button class="action-btn" id="btnSit"><div class="action-emoji">🪑</div><div class="action-name">앉기</div></button>
    <button class="action-btn" id="btnRest"><div class="action-emoji">🛌</div><div class="action-name">휴식</div></button>
  </div>

  <button class="stop-btn" id="stopBtn" disabled>⏹ 정지</button>

  <div class="today-card">
    <div class="card-title">📊 오늘 합계 <span class="card-title-sub" id="todayCycles">0 사이클</span></div>
    <div class="today-row">
      <div class="today-row-left">
        <div class="today-row-emoji row-stand">🏃</div>
        <div><div class="today-row-name">서기</div><div class="today-row-detail" id="standDetail">0회 · 평균 0분</div></div>
      </div>
      <div class="today-row-time t-stand" id="standTotal">0분</div>
    </div>
    <div class="today-row">
      <div class="today-row-left">
        <div class="today-row-emoji row-sit">🪑</div>
        <div><div class="today-row-name">앉기</div><div class="today-row-detail" id="sitDetail">0회 · 평균 0분</div></div>
      </div>
      <div class="today-row-time t-sit" id="sitTotal">0분</div>
    </div>
    <div class="today-row">
      <div class="today-row-left">
        <div class="today-row-emoji row-rest">🛌</div>
        <div><div class="today-row-name">휴식</div><div class="today-row-detail" id="restDetail">0회 · 평균 0분</div></div>
      </div>
      <div class="today-row-time t-rest" id="restTotal">0분</div>
    </div>
  </div>

  <div class="history-card">
    <div class="card-title">📅 일별 기록 <span class="card-title-sub">최근 14일</span></div>
    <div class="history-list" id="historyList">
      <div class="history-empty">아직 기록이 없어요. 첫 활동을 시작해보세요!</div>
    </div>
  </div>
</div>

<div class="alert" id="alertBanner">
  <div class="alert-emoji" id="alertEmoji">⏰</div>
  <div class="alert-text">
    <div class="alert-title" id="alertTitle">시간 도달</div>
    <div class="alert-sub" id="alertSub">권장 시간을 채웠어요</div>
  </div>
  <button class="alert-close" id="alertClose">✕</button>
</div>

<div class="toast" id="toast"></div>

<script>
const LIMITS = { stand: 20*60, sit: 30*60, rest: 60*60 };
const SURGERY = new Date('2026-03-18T00:00:00');
const STORE_KEY = 'recoveryTimer_v2';
const HISTORY_KEY = 'recoveryHistory_v2';

const ACTIONS = {
  stand: { emoji:'🏃', name:'서기', cls:'standing', btnCls:'active-stand' },
  sit:   { emoji:'🪑', name:'앉기', cls:'sitting',  btnCls:'active-sit' },
  rest:  { emoji:'🛌', name:'휴식', cls:'resting',  btnCls:'active-rest' },
};

let S = { current: null, startTime: null, alerted: false, timer: null };
let history = {};

const $ = id => document.getElementById(id);
const todayKey = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};
const formatTime = (sec) => {
  const m = Math.floor(Math.abs(sec)/60);
  const s = Math.abs(sec)%60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
};
const formatMin = (sec) => `${Math.floor(sec/60)}분`;
const formatHM = (sec) => {
  const h = Math.floor(sec/3600);
  const m = Math.floor((sec%3600)/60);
  if (h>0) return `${h}시간 ${m}분`;
  return `${m}분`;
};

function beep(freq, dur=0.2, vol=0.3) {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+dur);
    o.start(); o.stop(ctx.currentTime+dur);
  } catch(e){}
}
function playAlert() {
  beep(880, 0.15);
  setTimeout(()=>beep(1100, 0.2), 200);
  setTimeout(()=>beep(880, 0.3), 450);
}
function vib(p) { if (navigator.vibrate) navigator.vibrate(p); }

function startActivity(action) {
  if (S.current) stopActivity(false);
  S.current = action;
  S.startTime = Date.now();
  S.alerted = false;
  document.body.className = ACTIONS[action].cls;
  $('statusEmoji').textContent = ACTIONS[action].emoji;
  $('statusName').textContent = ACTIONS[action].name + ' 중';
  $('limitInfo').textContent = `권장 한도: ${LIMITS[action]/60}분`;
  $('stopBtn').disabled = false;
  document.querySelectorAll('.action-btn').forEach(b => b.className = 'action-btn');
  $(`btn${action.charAt(0).toUpperCase()+action.slice(1)}`).classList.add(ACTIONS[action].btnCls);
  saveState();
  startTick();
  showToast(`${ACTIONS[action].emoji} ${ACTIONS[action].name} 시작`);
}

function stopActivity(showMsg = true) {
  if (!S.current) return;
  const elapsed = Math.round((Date.now() - S.startTime) / 1000);
  if (elapsed >= 5) saveToHistory(S.current, elapsed);
  const action = S.current;
  S.current = null; S.startTime = null; S.alerted = false;
  clearInterval(S.timer);
  document.body.className = '';
  $('statusEmoji').textContent = '⏸';
  $('statusName').textContent = '대기 중';
  $('timerDisplay').textContent = '00:00';
  $('timerSub').textContent = '활동을 선택해주세요';
  $('timerSub').className = 'timer-sub';
  $('progressFill').style.width = '0%';
  $('progressFill').classList.remove('over');
  $('limitInfo').textContent = '서기 20분 · 앉기 30분 · 휴식 60분';
  $('stopBtn').disabled = true;
  document.querySelectorAll('.action-btn').forEach(b => b.className = 'action-btn');
  saveState();
  renderToday();
  renderHistory();
  if (showMsg && elapsed >= 5) {
    showToast(`${ACTIONS[action].emoji} ${ACTIONS[action].name} ${formatMin(elapsed)} 기록`);
  }
}

function startTick() {
  clearInterval(S.timer);
  updateTick();
  S.timer = setInterval(updateTick, 1000);
}

function updateTick() {
  if (!S.current) return;
  const elapsed = Math.round((Date.now() - S.startTime) / 1000);
  const limit = LIMITS[S.current];
  const remaining = limit - elapsed;
  if (remaining > 0) {
    $('timerDisplay').textContent = formatTime(elapsed);
    $('timerSub').textContent = `남은 시간 ${formatTime(remaining)}`;
    $('timerSub').className = 'timer-sub';
    $('progressFill').style.width = Math.min(100, (elapsed/limit)*100) + '%';
    $('progressFill').classList.remove('over');
  } else {
    $('timerDisplay').textContent = formatTime(elapsed);
    $('timerSub').textContent = `⚠ 권장 시간 ${formatTime(-remaining)} 초과`;
    $('timerSub').className = 'timer-sub over';
    $('progressFill').style.width = '100%';
    $('progressFill').classList.add('over');
    if (!S.alerted) {
      S.alerted = true;
      showAlert(S.current);
      playAlert();
      vib([300, 100, 300, 100, 500]);
    }
  }
}

function showAlert(action) {
  const banner = $('alertBanner');
  $('alertEmoji').textContent = ACTIONS[action].emoji;
  $('alertTitle').textContent = `${ACTIONS[action].name} 권장 시간 도달`;
  if (action === 'stand') $('alertSub').textContent = '이제 앉거나 누워서 쉬는 게 좋아요';
  else if (action === 'sit') $('alertSub').textContent = '이제 누워서 충분히 쉬세요';
  else $('alertSub').textContent = '충분히 쉬셨어요. 천천히 활동 시작해도 좋아요';
  banner.className = 'alert show ' + action;
  setTimeout(() => banner.classList.remove('show'), 8000);
}

let _toastTimer = null;
function showToast(msg) {
  $('toast').textContent = msg;
  $('toast').classList.add('show');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => $('toast').classList.remove('show'), 2000);
}

function saveState() {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify({
      current: S.current, startTime: S.startTime, alerted: S.alerted,
    }));
  } catch(e){}
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return;
    const v = JSON.parse(raw);
    if (v.current && v.startTime) {
      S.current = v.current;
      S.startTime = v.startTime;
      S.alerted = v.alerted || false;
      document.body.className = ACTIONS[S.current].cls;
      $('statusEmoji').textContent = ACTIONS[S.current].emoji;
      $('statusName').textContent = ACTIONS[S.current].name + ' 중';
      $('limitInfo').textContent = `권장 한도: ${LIMITS[S.current]/60}분`;
      $('stopBtn').disabled = false;
      $(`btn${S.current.charAt(0).toUpperCase()+S.current.slice(1)}`).classList.add(ACTIONS[S.current].btnCls);
      startTick();
    }
  } catch(e){}
}

function loadHistory() {
  try {
    const raw = localStorage.getItem(HISTORY_KEY);
    if (raw) history = JSON.parse(raw);
  } catch(e){ history = {}; }
}

function saveToHistory(action, seconds) {
  const key = todayKey();
  if (!history[key]) history[key] = { stand:[], sit:[], rest:[] };
  history[key][action].push(seconds);
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); } catch(e){}
}

function renderToday() {
  const key = todayKey();
  const today = history[key] || { stand:[], sit:[], rest:[] };
  ['stand','sit','rest'].forEach(action => {
    const arr = today[action] || [];
    const total = arr.reduce((a,b)=>a+b, 0);
    const count = arr.length;
    const avg = count>0 ? Math.round(total/count) : 0;
    $(`${action}Total`).textContent = formatHM(total);
    $(`${action}Detail`).textContent = `${count}회 · 평균 ${formatMin(avg)}`;
  });
  $('todayCycles').textContent = `${(today.rest||[]).length} 사이클`;
}

function renderHistory() {
  const list = $('historyList');
  const keys = Object.keys(history).sort().reverse().slice(0, 14);
  if (keys.length === 0) {
    list.innerHTML = '<div class="history-empty">아직 기록이 없어요. 첫 활동을 시작해보세요!</div>';
    return;
  }
  list.innerHTML = keys.map(k => {
    const day = history[k];
    const standT = (day.stand||[]).reduce((a,b)=>a+b,0);
    const sitT = (day.sit||[]).reduce((a,b)=>a+b,0);
    const restT = (day.rest||[]).reduce((a,b)=>a+b,0);
    const total = standT + sitT + restT;
    const cycles = (day.rest||[]).length;
    const standPct = total>0 ? (standT/total)*100 : 0;
    const sitPct = total>0 ? (sitT/total)*100 : 0;
    const restPct = total>0 ? (restT/total)*100 : 0;
    const dateLabel = formatDateLabel(k);
    return `
      <div class="history-day">
        <div class="history-day-header">
          <div class="history-day-date">${dateLabel}</div>
          <div class="history-day-cycles">${cycles}사이클 · 총 ${formatHM(total)}</div>
        </div>
        <div class="history-day-bars">
          <div class="bar-stand" style="width:${standPct}%"></div>
          <div class="bar-sit" style="width:${sitPct}%"></div>
          <div class="bar-rest" style="width:${restPct}%"></div>
        </div>
        <div class="history-day-times">
          <span class="t-stand">🏃 ${formatHM(standT)}</span>
          <span class="t-sit">🪑 ${formatHM(sitT)}</span>
          <span class="t-rest">🛌 ${formatHM(restT)}</span>
        </div>
      </div>`;
  }).join('');
}

function formatDateLabel(key) {
  const today = todayKey();
  const yesterday = (() => {
    const d = new Date(); d.setDate(d.getDate()-1);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  })();
  if (key === today) return '오늘';
  if (key === yesterday) return '어제';
  const [y,m,d] = key.split('-');
  const dateObj = new Date(y, m-1, d);
  const days = ['일','월','화','수','목','금','토'];
  return `${parseInt(m)}/${parseInt(d)} (${days[dateObj.getDay()]})`;
}

function updateDayCounter() {
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.floor((today - SURGERY) / (1000*60*60*24)) + 1;
  $('dayCounter').textContent = `🌿 수술 후 ${diff}일째`;
  const now = new Date();
  $('dateText').textContent = `${now.getMonth()+1}월 ${now.getDate()}일`;
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && S.current) updateTick();
  else saveState();
});
window.addEventListener('pagehide', saveState);
window.addEventListener('beforeunload', saveState);
window.addEventListener('pageshow', (e) => {
  if (e.persisted && S.current) { clearInterval(S.timer); startTick(); }
});
setInterval(() => { if (S.current) saveState(); }, 5000);

function bindAction(id, action) {
  const btn = $(id);
  const handler = (e) => { if (e) e.preventDefault(); startActivity(action); };
  btn.addEventListener('click', handler);
  btn.addEventListener('touchend', handler, { passive: false });
}
bindAction('btnStand', 'stand');
bindAction('btnSit', 'sit');
bindAction('btnRest', 'rest');

const stopHandler = (e) => { if (e) e.preventDefault(); stopActivity(true); };
$('stopBtn').addEventListener('click', stopHandler);
$('stopBtn').addEventListener('touchend', stopHandler, { passive: false });

$('alertClose').addEventListener('click', () => $('alertBanner').classList.remove('show'));

updateDayCounter();
loadHistory();
loadState();
renderToday();
renderHistory();
</script>
</body>
