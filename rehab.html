<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>달파도 재활 · 초급 프로그램</title>
<style>
  :root {
    --sky: #5fb8e8;
    --sky-deep: #3a9bd4;
    --sun: #ffc857;
    --coral: #ff8a6b;
    --mint: #6fd9b8;
    --ink: #234052;
    --ink-soft: #5a7689;
    --cloud: #ffffff;
    --paper: #f3faff;
    --line: #dceaf4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: linear-gradient(170deg, #d6f0ff 0%, #eaf8ff 40%, #f3faff 100%);
    color: var(--ink);
    min-height: 100%;
    overflow-x: hidden;
  }
  .wrap { max-width: 480px; margin: 0 auto; padding: 0 18px 80px; position: relative; }

  /* sky decoration */
  .sun-deco {
    position: fixed; top: -40px; right: -30px; width: 160px; height: 160px;
    background: radial-gradient(circle, var(--sun) 0%, rgba(255,200,87,0.25) 55%, transparent 70%);
    border-radius: 50%; pointer-events: none; z-index: 0; animation: glow 6s ease-in-out infinite;
  }
  @keyframes glow { 0%,100%{ transform: scale(1); opacity:.85;} 50%{ transform: scale(1.08); opacity:1;} }

  header { position: relative; z-index: 1; padding: 26px 4px 6px; }
  .streaks { display:flex; gap:10px; }
  .streak {
    flex:1; background:#fff; border:1px solid var(--line); border-radius:18px;
    padding:12px 14px; display:flex; align-items:center; gap:10px;
    box-shadow: 0 6px 16px -10px rgba(35,64,82,.18);
  }
  .s-ic { font-size:22px; }
  .s-num { font-size:24px; font-weight:800; line-height:1; color:var(--ink); }
  .s-num small { font-size:13px; font-weight:700; color:var(--ink-soft); }
  .s-cap { font-size:11.5px; font-weight:700; color:var(--sky-deep); margin-top:3px; }

  .daycard {
    position: relative; z-index: 1; margin-top: 14px;
    background: linear-gradient(135deg, var(--sky) 0%, var(--sky-deep) 100%);
    border-radius: 24px; padding: 22px 24px; color: #fff;
    box-shadow: 0 14px 30px -12px rgba(58,155,212,0.6);
    overflow: hidden;
  }
  .daycard::after {
    content:""; position:absolute; right:-30px; bottom:-40px; width:140px; height:140px;
    background: rgba(255,255,255,.14); border-radius:50%;
  }
  .daycard::before {
    content:""; position:absolute; right:36px; top:-24px; width:80px; height:80px;
    background: rgba(255,255,255,.1); border-radius:50%;
  }
  .day-label { font-size: 13px; opacity: .9; font-weight: 600; letter-spacing: .5px; }
  .day-num { font-size: 46px; font-weight: 800; line-height: 1.05; margin-top: 2px; }
  .day-num small { font-size: 18px; font-weight: 600; opacity: .9; }
  .day-phase {
    display: inline-block; margin-top: 10px; font-size: 12px; font-weight: 700;
    background: rgba(255,255,255,.22); padding: 5px 12px; border-radius: 20px; backdrop-filter: blur(4px);
  }
  .progress-mini { margin-top: 14px; height: 7px; background: rgba(255,255,255,.25); border-radius: 10px; overflow: hidden; }
  .progress-mini i { display:block; height:100%; background:#fff; border-radius:10px; transition: width .6s; }
  .progress-cap { font-size: 11px; opacity:.85; margin-top:7px; }

  .section-title { position: relative; z-index:1; margin: 26px 4px 12px; font-size: 17px; font-weight: 800; display:flex; align-items:center; gap:8px; }
  .section-title .pill { font-size: 11px; font-weight: 700; color: var(--sky-deep); background:#e4f3fc; padding: 3px 10px; border-radius: 12px; }

  .list { position: relative; z-index:1; display: flex; flex-direction: column; gap: 12px; }
  .card {
    background: var(--cloud); border-radius: 20px; padding: 16px 16px;
    box-shadow: 0 6px 18px -10px rgba(35,64,82,0.18); border: 1px solid var(--line);
    display: flex; align-items: center; gap: 14px; cursor: pointer; transition: transform .12s, box-shadow .2s;
  }
  .card:active { transform: scale(.985); }
  .card.done { background: linear-gradient(135deg, #eafaf3, #f1fff9); border-color: #c5efdd; }
  .ic {
    width: 50px; height: 50px; border-radius: 15px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size: 26px;
    background: var(--paper);
  }
  .card.done .ic { background:#d6f5e7; }
  .c-body { flex: 1; min-width: 0; }
  .c-name { font-size: 15.5px; font-weight: 700; display:flex; align-items:center; gap:6px; }
  .c-meta { font-size: 12.5px; color: var(--ink-soft); margin-top: 3px; }
  .c-cat { font-size: 10.5px; font-weight: 700; padding: 2px 8px; border-radius: 10px; display:inline-block; margin-bottom:4px; }
  .check {
    width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--line); flex-shrink:0;
    display:flex; align-items:center; justify-content:center; color:#fff; font-size:14px; transition: all .2s;
  }
  .card.done .check { background: var(--mint); border-color: var(--mint); }

  .footer-note {
    position: relative; z-index:1; margin-top: 24px; font-size: 11.5px; color: var(--ink-soft);
    background: #fff7e8; border:1px solid #ffe6b8; border-radius: 14px; padding: 12px 14px; line-height: 1.6;
  }
  .footer-note b { color: var(--coral); }

  .reset-btn {
    position: relative; z-index:1; margin: 16px auto 0; display:block; font-size:12px; color:var(--ink-soft);
    background:none; border:none; text-decoration: underline; cursor:pointer;
  }

  /* modal / counter */
  .overlay {
    position: fixed; inset: 0; background: linear-gradient(170deg, #d6f0ff, #f3faff);
    z-index: 50; display: none; flex-direction: column; padding: 0 20px;
    max-width: 480px; margin: 0 auto;
  }
  .overlay.show { display: flex; }
  .ov-top { padding: 22px 0 8px; display:flex; align-items:center; justify-content:space-between; }
  .ov-close { background:#fff; border:1px solid var(--line); width:40px; height:40px; border-radius:50%; font-size:20px; color:var(--ink-soft); cursor:pointer; }
  .ov-cat { font-size:12px; font-weight:700; padding:5px 12px; border-radius:14px; }
  .ov-name { font-size: 26px; font-weight: 800; margin: 6px 2px 2px; }
  .ov-desc { font-size: 14px; color: var(--ink-soft); line-height: 1.7; margin: 4px 2px 0; }

  .ring-wrap { flex:1; display:flex; flex-direction: column; align-items:center; justify-content:center; gap: 18px; }
  .ring { position: relative; width: 230px; height: 230px; }
  .ring svg { transform: rotate(-90deg); }
  .ring-center {
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  .ring-num { font-size: 64px; font-weight: 800; line-height:1; color: var(--ink); }
  .ring-sub { font-size: 14px; color: var(--ink-soft); margin-top:6px; font-weight:600; }
  .set-dots { display:flex; gap:8px; }
  .set-dots i { width: 28px; height: 7px; border-radius: 8px; background: var(--line); transition: background .3s; }
  .set-dots i.active { background: var(--sun); }
  .set-dots i.done { background: var(--mint); }

  .big-btn {
    width: 100%; padding: 18px; border:none; border-radius: 20px; font-size: 18px; font-weight: 800;
    color:#fff; cursor:pointer; margin-bottom: 8px; transition: transform .1s, filter .2s;
    box-shadow: 0 10px 22px -10px rgba(58,155,212,.6);
  }
  .big-btn:active { transform: scale(.97); }
  .tap-btn { background: linear-gradient(135deg, var(--coral), #ff7a5c); box-shadow: 0 10px 22px -10px rgba(255,138,107,.7); }
  .timer-btn { background: linear-gradient(135deg, var(--sky), var(--sky-deep)); }
  .ghost-btn { background:#fff; color:var(--ink-soft); border:1px solid var(--line); box-shadow:none; }
  .ov-foot { padding-bottom: 26px; }

  .celebrate { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:8px; }
  .celebrate .emoji { font-size: 72px; animation: pop .5s ease; }
  @keyframes pop { 0%{transform:scale(0);} 70%{transform:scale(1.2);} 100%{transform:scale(1);} }
  .celebrate h2 { font-size: 26px; font-weight: 800; }
  .celebrate p { font-size: 14px; color: var(--ink-soft); }

  .caution-box {
    background:#fff0ec; border:1px solid #ffd2c5; border-radius:14px; padding:12px 14px;
    font-size:12.5px; color:#c25a3e; line-height:1.6; margin: 4px 2px 0;
  }
  .caution-box b { font-weight:800; }

  .mode-pill {
    flex:1; padding:10px; border-radius:14px; border:1.5px solid var(--line); background:#fff;
    font-size:13px; font-weight:700; color:var(--ink-soft); cursor:pointer; transition: all .2s;
  }
  .mode-pill.active { background:var(--sky); color:#fff; border-color:var(--sky); }

  .walk-card {
    position:relative; z-index:1; background:linear-gradient(135deg,#eafaf3,#f1fff9);
    border:1px solid #c5efdd; border-radius:20px; padding:16px; box-shadow:0 6px 18px -10px rgba(35,64,82,.15);
  }
  .walk-top { display:flex; align-items:center; gap:12px; }
  .walk-ic { width:46px; height:46px; border-radius:14px; background:#d6f5e7; display:flex; align-items:center; justify-content:center; font-size:24px; }
  .walk-info { flex:1; }
  .walk-name { font-size:15.5px; font-weight:700; }
  .walk-sub { font-size:11.5px; color:var(--ink-soft); margin-top:2px; }
  .walk-mins { font-size:26px; font-weight:800; color:var(--mint); }
  .walk-mins small { font-size:13px; font-weight:700; }
  .walk-btns { display:flex; gap:7px; margin-top:14px; }
  .walk-add, .walk-timer {
    flex:1; padding:10px 4px; border-radius:12px; border:1.5px solid #bfe9d6; background:#fff;
    font-size:13px; font-weight:700; color:#2fa882; cursor:pointer; transition:all .15s;
  }
  .walk-add:active { background:#d6f5e7; transform:scale(.96); }
  .walk-timer { background:var(--mint); color:#fff; border-color:var(--mint); }
  .walk-symp { margin-top:14px; padding-top:12px; border-top:1px dashed #c5efdd; }
  .ws-label { font-size:12.5px; font-weight:700; color:var(--ink-soft); margin-bottom:8px; }
  .ws-opts { display:flex; gap:7px; }
  .ws-opt {
    flex:1; padding:9px 4px; border-radius:12px; border:1.5px solid var(--line); background:#fff;
    font-size:12.5px; font-weight:700; color:var(--ink-soft); cursor:pointer; transition:all .15s;
  }
  .ws-opt.sel-none { background:#d6f5e7; border-color:var(--mint); color:#2fa882; }
  .ws-opt.sel-mid { background:#fff4d9; border-color:var(--sun); color:#c98a00; }
  .ws-opt.sel-bad { background:#ffe2d9; border-color:var(--coral); color:#d2542f; }

  .grp-head { font-size:12.5px; font-weight:800; letter-spacing:.5px; margin:6px 4px 2px; }
  .grp-head:first-child { margin-top:0; }
</style>
</head>
<body>
<div class="sun-deco"></div>
<div class="wrap">
  <header>
    <div class="streaks">
      <div class="streak">
        <div class="s-ic">🚭</div>
        <div class="s-body"><div class="s-num" id="smokeNum">–</div><div class="s-cap">금연</div></div>
      </div>
      <div class="streak">
        <div class="s-ic">🚫🍺</div>
        <div class="s-body"><div class="s-num" id="alcoNum">–</div><div class="s-cap">금주</div></div>
      </div>
    </div>
  </header>

  <div class="daycard">
    <div class="day-label">수술 후</div>
    <div class="day-num" id="dayNum">–<small>일차</small></div>
    <div class="day-phase" id="phaseLabel">회복 단계</div>
    <div class="progress-mini"><i id="progBar" style="width:0%"></i></div>
    <div class="progress-cap" id="progCap">오늘의 운동</div>
  </div>

  <div class="section-title">
    오늘의 걷기 <span class="pill" id="walkPill">기록 전</span>
  </div>
  <div class="walk-card" id="walkCard">
    <div class="walk-top">
      <div class="walk-ic">🚶</div>
      <div class="walk-info">
        <div class="walk-name">걷기 (뉴발 1080)</div>
        <div class="walk-sub" id="walkSub">짧게 자주 · 평지 · 중립 자세</div>
      </div>
      <div class="walk-mins"><span id="walkTotal">0</span><small>분</small></div>
    </div>
    <div class="walk-btns">
      <button class="walk-add" data-min="10">+10분</button>
      <button class="walk-add" data-min="15">+15분</button>
      <button class="walk-add" data-min="20">+20분</button>
      <button class="walk-timer" id="walkTimerBtn">⏱ 타이머</button>
    </div>
    <div class="walk-symp" id="walkSymp">
      <div class="ws-label">걷고 난 뒤 우측 증상은?</div>
      <div class="ws-opts">
        <button class="ws-opt" data-s="없음">없음 😊</button>
        <button class="ws-opt" data-s="약간">약간 😐</button>
        <button class="ws-opt" data-s="심함">심함 😣</button>
      </div>
    </div>
  </div>

  <div class="section-title">
    오늘의 운동 <span class="pill" id="doneCount">0 / 15</span>
  </div>
  <div class="list" id="list"></div>

  <div class="footer-note">
    <b>안전 원칙</b> · 허리 과신전(슈퍼맨류) 금지 · 무릎을 가슴으로 깊이 당기지 않기 · 척추 비틀기 금지<br>
    다리 방사통·저림, 안정 시 통증 증가, 무리 후 발등 가려움이 나오면 그날은 중단하세요.
  </div>
  <button class="reset-btn" id="resetBtn">오늘 기록 초기화</button>
</div>

<!-- Exercise overlay -->
<div class="overlay" id="overlay">
  <div class="ov-top">
    <span class="ov-cat" id="ovCat">근력</span>
    <button class="ov-close" id="ovClose">✕</button>
  </div>
  <div id="ovInfo">
    <div class="ov-name" id="ovName">운동</div>
    <div class="ov-desc" id="ovDesc"></div>
    <div class="caution-box" id="ovCaution"></div>
  </div>

  <div class="ring-wrap" id="ringWrap">
    <div class="set-dots" id="setDots"></div>
    <div class="ring">
      <svg width="230" height="230">
        <circle cx="115" cy="115" r="100" stroke="#e3eef6" stroke-width="16" fill="none"/>
        <circle id="ringFill" cx="115" cy="115" r="100" stroke="url(#grad)" stroke-width="16" fill="none"
          stroke-linecap="round" stroke-dasharray="628" stroke-dashoffset="628"/>
        <defs>
          <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#ffc857"/>
            <stop offset="100%" stop-color="#ff8a6b"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="ring-center">
        <div class="ring-num" id="ringNum">0</div>
        <div class="ring-sub" id="ringSub"></div>
      </div>
    </div>
  </div>

  <div class="celebrate" id="celebrate" style="display:none">
    <div class="emoji">🎉</div>
    <h2>완료!</h2>
    <p id="celebText">오늘도 한 걸음 나아갔어요</p>
  </div>

  <div class="ov-foot" id="ovFoot">
    <div id="modeToggle" style="display:flex;gap:8px;margin-bottom:10px;">
      <button class="mode-pill active" id="modeAuto">🔄 자동 카운트</button>
      <button class="mode-pill" id="modeManual">👆 직접 탭</button>
    </div>
    <button class="big-btn tap-btn" id="mainBtn">시작</button>
    <button class="big-btn ghost-btn" id="skipBtn">완료 처리하고 닫기</button>
  </div>
</div>

<script>
const SURGERY_DATE = new Date("2026-03-18T00:00:00+09:00");
const SMOKE_FREE_DATE = new Date("2026-01-08T00:00:00+09:00");
const ALCOHOL_FREE_DATE = new Date("2026-03-14T00:00:00+09:00");

const CATS = {
  warm:  { name: "준비",   color: "#3a9bd4", bg: "#e4f3fc" },
  stretch:{ name: "스트레칭", color: "#2fa882", bg: "#e1f7ef" },
  strength:{ name: "근력",   color: "#e07a4a", bg: "#fdeee6" },
  posture:{ name: "자세",   color: "#8b6fd9", bg: "#efeafb" },
};

// type: 'rep' (count) | 'time' (seconds, per side or single)
const EX = [
  { id:"breath", icon:"🌬️", name:"복식호흡", cat:"warm", type:"rep", reps:6, sets:1, tempo:6,
    meta:"6회 · 1세트",
    desc:"누워서 무릎을 굽힙니다. 코로 들이쉬며 배를 부풀리고, 입으로 천천히 내쉬며 배를 당깁니다. 내쉴 때 아랫배와 골반저를 살짝 조입니다.",
    caution:"" },
  { id:"ham", icon:"🦵", name:"햄스트링 스트레칭", cat:"stretch", type:"time", secs:25, sets:2, perSide:true,
    meta:"25초 유지 · 좌우 2회",
    desc:"누워서 한쪽 다리를 들어 무릎 뒤를 잡고 천천히 폅니다. 허리는 바닥에 붙인 채로 유지합니다.",
    caution:"허리가 굴곡되지 않게 — 다리를 당기되 골반은 바닥에 고정." },
  { id:"quad", icon:"🦿", name:"허벅지 스트레칭", cat:"stretch", type:"time", secs:25, sets:2, perSide:true,
    meta:"25초 유지 · 좌우 2회",
    desc:"옆으로 누워, 위쪽 발목을 같은 쪽 손으로 잡고 엉덩이 쪽으로 천천히 당깁니다. 허벅지 앞이 당겨집니다.",
    caution:"허리가 뒤로 꺾이지 않게(과신전 금지). 배·둔근 살짝 조이고 골반 중립 유지." },
  { id:"calf", icon:"🧦", name:"종아리 스트레칭", cat:"stretch", type:"time", secs:25, sets:2, perSide:true,
    meta:"25초 유지 · 좌우 2회",
    desc:"벽을 밀듯 한 다리를 뒤로 뻗어 뒤꿈치를 바닥에 붙이거나, 수건을 발바닥에 걸어 몸쪽으로 당깁니다.",
    caution:"" },
  { id:"piri", icon:"🧘", name:"이상근 스트레칭", cat:"stretch", type:"time", secs:25, sets:2, perSide:true,
    meta:"25초 유지 · 좌우 2회",
    desc:"누워서 한쪽 발목을 반대쪽 무릎 위에 올려 figure-4를 만들고, 아래쪽 허벅지를 손으로 당깁니다. 엉덩이 깊은 곳이 늘어납니다.",
    caution:"" },
  { id:"clam", icon:"🐚", name:"클램쉘", cat:"strength", type:"rep", reps:10, sets:2, perSide:true, tempo:3,
    meta:"10회 · 2세트 · 좌우",
    desc:"옆으로 누워 무릎을 굽힙니다. 두 발을 붙인 채 위쪽 무릎만 벌렸다 모읍니다. 골반이 뒤로 넘어가지 않게 합니다.",
    caution:"골반이 뒤로 구르지 않게 고정 — 둔근(엉덩이)에 힘이 들어가는 걸 느끼세요." },
  { id:"dead", icon:"🐞", name:"데드버그", cat:"strength", type:"rep", reps:8, sets:2, tempo:3,
    meta:"좌우 교대 8회 · 2세트",
    desc:"누워서 팔과 무릎을 90도로 듭니다. 반대쪽 팔·다리를 천천히 뻗었다가 돌아옵니다. 허리가 바닥에서 뜨지 않게 합니다.",
    caution:"허리가 바닥에서 들리면 멈추세요. 허리-바닥 밀착이 핵심." },
  { id:"sidelift", icon:"🦩", name:"옆으로 누워 다리 올리기", cat:"strength", type:"rep", reps:10, sets:2, perSide:true, tempo:3,

// ---- day / phase ----
function daysSince(){
  return daysFrom(SURGERY_DATE);
}
function daysFrom(dateObj){
  const now = new Date();
  const kst = new Date(now.toLocaleString("en-US",{timeZone:"Asia/Seoul"}));
  const d0 = new Date(dateObj.toLocaleString("en-US",{timeZone:"Asia/Seoul"}));
  kst.setHours(0,0,0,0); d0.setHours(0,0,0,0);
  return Math.floor((kst - d0)/86400000);
}
function phaseInfo(d){
  if(d < 43) return {label:"초기 회복기", pct: Math.min(d/180*100,100)};
  if(d < 85) return {label:"중기 회복기", pct: Math.min(d/180*100,100)};
  if(d < 181) return {label:"후기 회복기", pct: Math.min(d/180*100,100)};
  return {label:"유지기", pct:100};
}

// ---- sound (Web Audio) ----
let audioCtx=null;
function ac(){ if(!audioCtx){ try{ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return audioCtx; }
function beep(freq, dur, type, vol){
  const c=ac(); if(!c) return;
  if(c.state==="suspended") c.resume();
  const o=c.createOscillator(), g=c.createGain();
  o.type=type||"sine"; o.frequency.value=freq;
  g.gain.setValueAtTime(vol||0.12, c.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime+(dur||0.12));
  o.connect(g); g.connect(c.destination);
  o.start(); o.stop(c.currentTime+(dur||0.12));
}
function sndCount(){ beep(660,0.09,"sine",0.10); }
function sndSet(){ beep(523,0.12,"triangle",0.13); setTimeout(()=>beep(784,0.16,"triangle",0.13),120); }
function sndFinish(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.18,"sine",0.14),i*150)); }

// ---- 음성 안내 (TTS) ----
let koVoice=null;
function loadVoices(){
  if(!("speechSynthesis" in window)) return;
  const vs=window.speechSynthesis.getVoices();
  if(vs.length>0){ koVoice = vs.find(v=>v.lang==="ko-KR"||v.lang.startsWith("ko")) || vs[0]; }
}
if("speechSynthesis" in window){ loadVoices(); window.speechSynthesis.onvoiceschanged=loadVoices; }
function speak(text){
  if(!("speechSynthesis" in window)) return;
  try{
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    if(koVoice) u.voice=koVoice;
    u.lang="ko-KR"; u.rate=1.15; u.pitch=1.0;
    window.speechSynthesis.speak(u);
  }catch(e){}
}
const KNUM=["","하나","둘","셋","넷","다섯","여섯","일곱","여덟","아홉","열","열하나","열둘","열셋","열넷","열다섯"];
function speakCount(n){ speak(KNUM[n] || (n+"회")); }
// 카운트다운용: 남은 초를 한국어로 (10 이하는 고유어, 그 위는 한자어 "이십오")
function numKo(n){
  if(n<=10) return KNUM[n] || String(n);
  const sino=["영","일","이","삼","사","오","육","칠","팔","구"];
  const tens=["","십","이십","삼십","사십","오십","육십"];
  const t=Math.floor(n/10), o=n%10;
  return (tens[t]||"") + (o? sino[o]:"");
}

function render(){
  const d = daysSince();
  const p = phaseInfo(d);
  document.getElementById("smokeNum").innerHTML = daysFrom(SMOKE_FREE_DATE) + '<small>일</small>';
  document.getElementById("alcoNum").innerHTML = daysFrom(ALCOHOL_FREE_DATE) + '<small>일</small>';
  document.getElementById("dayNum").innerHTML = d + '<small>일차</small>';
  document.getElementById("phaseLabel").textContent = p.label;
  document.getElementById("progBar").style.width = (done.length/EX.length*100)+"%";
  document.getElementById("progCap").textContent =
    done.length===EX.length ? "오늘 운동 완료 — 잘하셨어요 🌟" : (EX.length-done.length)+"개 남았어요";
  document.getElementById("doneCount").textContent = done.length+" / "+EX.length;

  // 걷기 표시
  document.getElementById("walkTotal").textContent = walk.min;
  document.getElementById("walkPill").textContent = walk.min>0 ? walk.min+"분 걸음" : "기록 전";
  document.querySelectorAll(".ws-opt").forEach(b=>{
    b.classList.remove("sel-none","sel-mid","sel-bad");
    if(walk.symp===b.dataset.s){
      b.classList.add(b.dataset.s==="없음"?"sel-none":b.dataset.s==="약간"?"sel-mid":"sel-bad");
    }
  });

  const list = document.getElementById("list");
  list.innerHTML = "";
  const order=["warm","stretch","strength","posture"];
  let lastCat=null;
  EX.slice().sort((a,b)=>order.indexOf(a.cat)-order.indexOf(b.cat)).forEach(ex=>{
    const c = CATS[ex.cat];
    if(ex.cat!==lastCat){
      lastCat=ex.cat;
      const h=document.createElement("div");
      h.className="grp-head";
      h.style.color=c.color;
      h.textContent=c.name;
      list.appendChild(h);
    }
    const isDone = done.includes(ex.id);
    const el = document.createElement("div");
    el.className = "card"+(isDone?" done":"");
    el.innerHTML = `
      <div class="ic">${ex.icon}</div>
      <div class="c-body">
        <span class="c-cat" style="color:${c.color};background:${c.bg}">${c.name}</span>
        <div class="c-name">${ex.name}</div>
        <div class="c-meta">${ex.meta}</div>
      </div>
      <div class="check">${isDone?"✓":""}</div>`;
    el.onclick = ()=> openEx(ex);
    list.appendChild(el);
  });
}

// ---- overlay logic ----
let cur=null, curSet=0, repCount=0, timerId=null, timeLeft=0, totalSegs=0;
let autoMode=true, autoId=null, autoPhase=0;

function openEx(ex){
  cur=ex; curSet=0; repCount=0;
  clearInterval(timerId); timerId=null;
  const c = CATS[ex.cat];
  document.getElementById("ovCat").textContent = c.name;
  document.getElementById("ovCat").style.color = c.color;
  document.getElementById("ovCat").style.background = c.bg;
  document.getElementById("ovName").textContent = ex.name;
  document.getElementById("ovDesc").textContent = ex.desc;
  const cb = document.getElementById("ovCaution");
  if(ex.caution){ cb.style.display="block"; cb.innerHTML = "⚠️ "+ex.caution; }
  else cb.style.display="none";

  // total segments = sets * (perSide?2:1)
  totalSegs = ex.sets * (ex.perSide?2:1);
  buildDots();
  // 모드 토글: 반복 운동에만 표시
  document.getElementById("modeToggle").style.display = (ex.type==="rep") ? "flex" : "none";
  document.getElementById("ovInfo").style.display="block";
  document.getElementById("ringWrap").style.display="flex";
  document.getElementById("celebrate").style.display="none";
  document.getElementById("ovFoot").style.display="block";
  document.getElementById("skipBtn").style.display="block";
  document.getElementById("skipBtn").textContent="완료 처리하고 닫기";
  document.getElementById("mainBtn").onclick=mainBtnDefault;
  document.getElementById("skipBtn").onclick=skipDefault;
  resetSegUI();
  document.getElementById("overlay").classList.add("show");
}

function setMode(m){
  autoMode = m;
  clearInterval(autoId); autoId=null;
  document.getElementById("modeAuto").classList.toggle("active", m);
  document.getElementById("modeManual").classList.toggle("active", !m);
  resetSegUI();
}
document.getElementById("modeAuto").onclick=()=>setMode(true);
document.getElementById("modeManual").onclick=()=>setMode(false);

function buildDots(){
  const dots=document.getElementById("setDots"); dots.innerHTML="";
  for(let i=0;i<totalSegs;i++){ const s=document.createElement("i"); dots.appendChild(s); }
  paintDots();
}
function paintDots(){
  document.querySelectorAll("#setDots i").forEach((el,i)=>{
    el.className = i<curSet ? "done" : (i===curSet ? "active":"");
  });
}
function segLabel(){
  if(cur.perSide){ const side = (curSet%2===0)?"왼쪽":"오른쪽"; const setNo=Math.floor(curSet/2)+1; return side+" · "+setNo+"세트"; }
  return (curSet+1)+"세트";
}

function resetSegUI(){
  clearInterval(autoId); autoId=null;
  clearInterval(timerId); timerId=null;
  const fill=document.getElementById("ringFill");
  fill.style.strokeDashoffset=628;
  if(cur.type==="rep"){
    repCount=0;
    document.getElementById("ringNum").textContent="0";
    document.getElementById("ringSub").textContent=segLabel()+" · 목표 "+cur.reps;
    const b=document.getElementById("mainBtn");
    if(autoMode){ b.textContent="▶ 자동 시작"; b.className="big-btn timer-btn"; }
    else { b.textContent="탭해서 카운트"; b.className="big-btn tap-btn"; }
  } else {
    timeLeft=cur.secs;
    document.getElementById("ringNum").textContent=cur.secs;
    document.getElementById("ringSub").textContent=segLabel()+" · 유지";
    const b=document.getElementById("mainBtn");
    b.textContent="시작"; b.className="big-btn timer-btn";
  }
}

function autoTick(){
  // 한 회를 tempo초에 걸쳐 링을 채우고, 끝에 카운트
  const tempo = cur.tempo || 3;
  const stepMs = 50;
  const incPerStep = 1/(tempo*1000/stepMs);
  autoPhase += incPerStep;
  if(autoPhase >= 1){
    autoPhase = 0;
    repCount++;
    document.getElementById("ringNum").textContent=repCount;
    sndCount();
    speakCount(repCount);
    if(repCount>=cur.reps){
      clearInterval(autoId); autoId=null;
      document.getElementById("ringFill").style.strokeDashoffset=0;
      sndSet();
      setTimeout(segDone,300);
      return;
    }
  }
  // 링은 이번 회의 진행도를 표시
  const off=628*(1-autoPhase);
  document.getElementById("ringFill").style.strokeDashoffset=off;
}

function mainBtnDefault(){
  if(!cur || cur==="WALK") return;
  if(cur.type==="rep"){
    if(autoMode){
      const b=document.getElementById("mainBtn");
      if(autoId){ clearInterval(autoId); autoId=null; b.textContent="▶ 계속"; return; }
      b.textContent="⏸ 일시정지";
      // 시작 즉시 첫 회("하나") 카운트
      if(repCount===0){
        repCount=1;
        document.getElementById("ringNum").textContent=1;
        sndCount(); speakCount(1);
        if(repCount>=cur.reps){ document.getElementById("ringFill").style.strokeDashoffset=0; sndSet(); setTimeout(segDone,400); return; }
      }
      autoId=setInterval(autoTick,50);
      return;
    }
    // 수동 탭
    repCount++;
    document.getElementById("ringNum").textContent=repCount;
    sndCount();
    speakCount(repCount);
    const off=628*(1-Math.min(repCount/cur.reps,1));
    document.getElementById("ringFill").style.strokeDashoffset=off;
    if(repCount>=cur.reps){ sndSet(); setTimeout(segDone,250); }
  } else {
    const b=document.getElementById("mainBtn");
    if(timerId){ clearInterval(timerId); timerId=null; b.textContent="계속"; return; }
    b.textContent="일시정지";
    speak("시작");
    timerId=setInterval(()=>{
      timeLeft--;
      document.getElementById("ringNum").textContent=Math.max(timeLeft,0);
      const off=628*(1-(cur.secs-timeLeft)/cur.secs);
      document.getElementById("ringFill").style.strokeDashoffset=off;
      if(timeLeft>0){
        beep(620,0.06,"sine",0.07); // 매초 틱 소리
        // 음성: 10초 이하는 매초, 그 위는 5초 단위로 남은 시간 안내
        if(timeLeft<=10) speak(numKo(timeLeft));
        else if(timeLeft%5===0) speak(numKo(timeLeft));
      }
      if(timeLeft<=0){ clearInterval(timerId); timerId=null; sndSet(); segDone(); }
    },1000);
  }
}
document.getElementById("mainBtn").onclick=mainBtnDefault;

function segDone(){
  autoPhase=0;
  curSet++;
  if(curSet>=totalSegs){ finishEx(); return; }
  paintDots();
  resetSegUI();
  setTimeout(()=>{ if(cur) speak(cur.perSide ? (curSet%2===0?"왼쪽":"오른쪽") : (curSet+1)+"세트"); }, 600);
}

function finishEx(){
  if(!done.includes(cur.id)){ done.push(cur.id); saveDone(done); }
  sndFinish();
  setTimeout(()=>speak("완료했습니다. 수고하셨어요"),300);
  document.getElementById("ovInfo").style.display="none";
  document.getElementById("ringWrap").style.display="none";
  document.getElementById("ovFoot").style.display="none";
  const cel=document.getElementById("celebrate");
  cel.style.display="flex";
  const msgs=["오늘도 한 걸음 나아갔어요","둔근이 고마워합니다","꾸준함이 회복의 핵심이에요","바다처럼 천천히, 꾸준히"];
  document.getElementById("celebText").textContent=msgs[Math.floor(Math.random()*msgs.length)];
  setTimeout(()=>{ closeOv(); render(); }, 1400);
}

function closeOv(){
  clearInterval(timerId); timerId=null;
  clearInterval(autoId); autoId=null; autoPhase=0;
  if(typeof walkTimerId!=="undefined"){ clearInterval(walkTimerId); walkTimerId=null; }
  cur=null;
  document.getElementById("overlay").classList.remove("show");
}
document.getElementById("ovClose").onclick=closeOv;
document.getElementById("skipBtn").onclick=skipDefault;

document.getElementById("resetBtn").onclick=()=>{
  if(confirm("오늘 운동 기록을 초기화할까요?")){ done=[]; saveDone(done); walk={min:0,symp:null}; saveWalk(walk); render(); }
};

  document.getElementById("ovCat").textContent="걷기";

  document.getElementById("ovCat").style.background="#d6f5e7";

  document.getElementById("ovCaution").style.display="none";

  document.getElementById("ringWrap").style.display="flex";
  document.getElementById("celebrate").style.display="none";

  mb.onclick=()=>{

    mb.textContent="⏸ 일시정지"; speak("시작");

      walkSec++;
      const m=Math.floor(walkSec/60), s=walkSec%60;
      document.getElementById("ringNum").textContent=m+":"+(s<10?"0":"")+s;
      document.getElementById("ringFill").style.strokeDashoffset=628*(1-(walkSec%60)/60);
      if(s===0 && m>0){ beep(620,0.08,"sine",0.08); speak(numKo(m)+"분"); }
    },1000);
  };
  document.getElementById("skipBtn").onclick=()=>{
    clearInterval(walkTimerId); walkTimerId=null;
    const addMin=Math.round(walkSec/60);
    if(addMin>0){ walk.min+=addMin; saveWalk(walk); }
    document.getElementById("skipBtn").textContent="완료 처리하고 닫기"; // 복구
    document.getElementById("skipBtn").onclick=skipDefault;
    closeOv(); render();
    if(addMin>0) setTimeout(()=>speak(numKo(addMin)+"분 걸었습니다"),300);
  };
  document.getElementById("overlay").classList.add("show");
}

// skip 기본 동작 복구용
function skipDefault(){
  if(cur && cur!=="WALK" && !done.includes(cur.id)){ done.push(cur.id); saveDone(done); }
  closeOv(); render();
}

render();
</script>
</body>
