<body>
<div id="app" class="app"></div>

<script>
// ============ 알림음 시스템 ============
let audioCtx = null;
const getCtx = () => {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { return null; }
  }
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
};

const beep = (freq, duration = 150, volume = 0.3) => {
  const ctx = getCtx();
  if (!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.frequency.value = freq; osc.type = "sine";
  const now = ctx.currentTime;
  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(volume, now + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, now + duration / 1000);
  osc.start(now); osc.stop(now + duration / 1000);
};

const sounds = {
  tick: () => beep(800, 100, 0.25),
  repDone: () => beep(880, 150, 0.3),
  setDone: () => { beep(660, 180, 0.35); setTimeout(() => beep(880, 250, 0.35), 200); },
  allDone: () => {
    beep(660, 180, 0.35);
    setTimeout(() => beep(880, 180, 0.35), 200);
    setTimeout(() => beep(1100, 400, 0.4), 400);
  },
};

// ============ TTS 음성 안내 ============
let koVoice = null;
let allVoices = [];

const loadVoices = () => {
  if (!("speechSynthesis" in window)) return;
  const voices = window.speechSynthesis.getVoices();
  if (voices.length > 0) {
    allVoices = voices;
    koVoice = voices.find(v => v.lang === "ko-KR")
           || voices.find(v => v.lang && v.lang.startsWith("ko"))
           || null;
  }
};

if ("speechSynthesis" in window) {
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
  let retries = 0;
  const retry = setInterval(() => {
    if (allVoices.length > 0 || retries > 15) { clearInterval(retry); return; }
    loadVoices(); retries++;
  }, 300);
}

const speak = (text, onEnd) => {
  if (!("speechSynthesis" in window)) { if (onEnd) setTimeout(onEnd, 0); return; }
  try {
    if (allVoices.length === 0) loadVoices();
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    if (koVoice) u.voice = koVoice;
    u.lang = "ko-KR"; u.rate = 1.1; u.pitch = 1.0; u.volume = 1.0;
    if (onEnd) {
      let fired = false;
      const fire = () => { if (!fired) { fired = true; onEnd(); } };
      u.onend = fire;
      u.onerror = fire;
      // 안전장치: 8초 내 이벤트 미발생 시 강제 호출
      setTimeout(fire, 8000);
    }
    setTimeout(() => window.speechSynthesis.speak(u), 50);
  } catch (e) { console.error("TTS error:", e); if (onEnd) setTimeout(onEnd, 0); }
};

const getTTSStatus = () => {
  if (!("speechSynthesis" in window)) return "TTS 미지원 브라우저";
  if (allVoices.length === 0) return "음성 엔진 로딩 안됨 (0개)";
  const koVoices = allVoices.filter(v => v.lang && v.lang.startsWith("ko"));
  return `전체 ${allVoices.length}개 / 한국어 ${koVoices.length}개${koVoice ? ` / 선택: ${koVoice.name}` : ""}`;
};

const testAudio = () => {
  getCtx();
  beep(800, 200, 0.3);
  setTimeout(() => speak("안녕하세요 테스트입니다"), 400);
};

// ============ 저장소 (localStorage) ============
const storage = {
  get: (key) => {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }
    catch (e) { return null; }
  },
  set: (key, value) => {
    try { localStorage.setItem(key, JSON.stringify(value)); }
    catch (e) {}
  },
  remove: (key) => { try { localStorage.removeItem(key); } catch (e) {} }
};

// ============ 아이콘 (SVG) ============
const icons = {
  plus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>',
  trash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
  play: '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg>',
  pause: '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>',

// 오늘 날짜 키 (YYYY-MM-DD)
const todayKey = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
};
// 수술일 (2026-03-18)로부터 경과 일수 (수술 당일 = 1일째)
const daysSinceSurgery = () => {
  const surgery = new Date(2026, 2, 18); // 월은 0부터: 3월 = 2
  surgery.setHours(0, 0, 0, 0);
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const diffMs = today - surgery;
  return Math.floor(diffMs / (1000 * 60 * 60 * 24)) + 1;
};
// 저장된 완료 횟수: { date: "YYYY-MM-DD", counts: { itemId: n } }
const loadCompletedToday = () => {
  const stored = storage.get("rehab_completed") || {};
  if (stored.date !== todayKey()) return {}; // 날짜 바뀌면 자동 리셋
  return stored.counts || {};
};
const saveCompletedToday = (counts) => {
  storage.set("rehab_completed", { date: todayKey(), counts });
};

// ============ 상태 ============
const state = {
  items: storage.get("rehab_items") || [],
  soundOn: storage.get("rehab_sound") !== false,
  activeItem: null,
  showAddModal: false,
  addStep: "select",  // select | form
  addType: null,
  editingItem: null,  // 수정 중인 항목 (null이면 새로 추가)
  deleteTarget: null, // 삭제 확인 대상
  completedToday: loadCompletedToday(),
  debugInfo: "",
};

const saveItems = () => storage.set("rehab_items", state.items);
const saveSound = () => storage.set("rehab_sound", state.soundOn);
const incrementCompleted = (itemId) => {
  state.completedToday[itemId] = (state.completedToday[itemId] || 0) + 1;
  saveCompletedToday(state.completedToday);
};

// ============ 터치 드래그 (모바일 순서 변경) ============
let touchDrag = null;
document.addEventListener("touchmove", (e) => {
  if (!touchDrag) return;
  e.preventDefault();
  const t = e.touches[0];
  const el = document.elementFromPoint(t.clientX, t.clientY);
  const li = el && el.closest(".list-item");
  document.querySelectorAll(".list-item").forEach(x => {
    if (x !== touchDrag.el) x.classList.remove("drag-over");
  });
  if (li && li !== touchDrag.el) li.classList.add("drag-over");
}, { passive: false });
document.addEventListener("touchend", (e) => {
  if (!touchDrag) return;
  const t = e.changedTouches[0];
  const el = document.elementFromPoint(t.clientX, t.clientY);
  const li = el && el.closest(".list-item");
  if (li && li !== touchDrag.el) {
    const fromIdx = state.items.findIndex(i => i.id === touchDrag.id);
    const toIdx = state.items.findIndex(i => i.id === li.dataset.id);
    if (fromIdx >= 0 && toIdx >= 0) {
      const [moved] = state.items.splice(fromIdx, 1);
      state.items.splice(toIdx, 0, moved);
      saveItems();
    }
  }
  touchDrag = null;
  render();
});
document.addEventListener("touchcancel", () => {
  touchDrag = null;
  document.querySelectorAll(".list-item").forEach(x => {
    x.classList.remove("dragging");
    x.classList.remove("drag-over");
  });
});

// ============ 렌더링 ============
const $app = document.getElementById("app");

function render() {
  if (state.activeItem) {
    renderActive();
  } else {
    renderHome();
  }
}

function renderHome() {
  const typeInfo = {
    set: { label: "세트운동", icon: icons.repeat, cls: "set" },
    timer: { label: "타이머", icon: icons.clock, cls: "timer" },
    simple: { label: "일반", icon: icons.list, cls: "simple" },
  };

  $app.innerHTML = `
    <header class="header">
      <div class="header-title">
        <h1>수술 후 ${daysSinceSurgery()}일째</h1>
        <p>${state.items.length > 0 ? state.items.length + "개의 운동" : "운동을 추가해보세요"}</p>
      </div>
      <button class="icon-btn ${state.soundOn ? "sound-on" : "sound-off"}" id="btn-sound" aria-label="소리 토글">
        ${state.soundOn ? icons.volumeOn : icons.volumeOff}
      </button>
    </header>
    <main>
      ${state.debugInfo ? `
        <div class="debug-info">
          <div>
            <strong>🔍 TTS 상태</strong>
            <span>${state.debugInfo}</span>
          </div>
          <button id="btn-debug-close">${icons.x}</button>
        </div>
      ` : ""}
      ${state.items.length === 0 ? `
        <div class="empty">
          <div class="empty-icon" style="color:#94a3b8">${icons.plus}</div>
          <p>아래 + 버튼을 눌러<br/>운동을 추가해보세요</p>
        </div>
      ` : `
        <ul class="list">
          ${state.items.map((item, idx) => {
            const doneCount = state.completedToday[item.id] || 0;
            return `
              <li class="list-item" data-id="${item.id}" data-idx="${idx}" draggable="true">
                <div class="drag-handle" data-drag>${icons.grip}</div>
                <button type="button" class="check-btn-big ${doneCount > 0 ? "done" : ""}" data-check="${item.id}" aria-label="완료 체크">${icons.check}</button>
                <div class="list-item-body">
                  <p>${escapeHtml(item.name)}</p>
                  ${doneCount > 0 ? `<p class="done-line">오늘 ${doneCount}회 완료</p>` : ""}
                </div>
                <button type="button" class="edit-btn" data-edit="${item.id}">${icons.edit}</button>
                <button type="button" class="delete-btn" data-delete="${item.id}">${icons.trash}</button>
              </li>
            `;
          }).join("")}
        </ul>
      `}
    </main>
    <div class="bottom-bar">
      <button class="add-btn" id="btn-add">${icons.plus} 운동 추가</button>
    </div>
  `;

  // 이벤트 바인딩
  document.getElementById("btn-sound").onclick = () => {
    state.soundOn = !state.soundOn;
    saveSound();
    if (state.soundOn) beep(880, 100, 0.3);
    render();
  };
  document.getElementById("btn-add").onclick = () => {
    state.showAddModal = true;
    state.addStep = "select";
    state.addType = null;
    renderAddModal();
  };
  const dbgClose = document.getElementById("btn-debug-close");
  if (dbgClose) dbgClose.onclick = () => { state.debugInfo = ""; render(); };

  // 리스트 아이템
  document.querySelectorAll(".list-item").forEach(el => {
    el.onclick = (e) => {
      if (e.target.closest("[data-delete]")) return;
      if (e.target.closest("[data-edit]")) return;
      if (e.target.closest("[data-check]")) return;
      if (e.target.closest("[data-drag]")) return;
      const id = el.dataset.id;
      const item = state.items.find(i => i.id === id);
      if (item) {
        state.activeItem = item;
        render();
      }
    };
    // 드래그 순서 변경 (데스크톱 HTML5 drag)
    el.ondragstart = (e) => {
      el.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
      e.dataTransfer.setData("text/plain", el.dataset.id);
    };
    el.ondragend = () => {
      el.classList.remove("dragging");
      document.querySelectorAll(".list-item").forEach(x => x.classList.remove("drag-over"));
    };
    el.ondragover = (e) => {
      e.preventDefault();
      const dragging = document.querySelector(".list-item.dragging");
      if (!dragging || dragging === el) return;
      el.classList.add("drag-over");
    };
    el.ondragleave = () => el.classList.remove("drag-over");
    el.ondrop = (e) => {
      e.preventDefault();
      el.classList.remove("drag-over");
      const draggedId = e.dataTransfer.getData("text/plain");
      const targetId = el.dataset.id;
      if (draggedId === targetId) return;
      const fromIdx = state.items.findIndex(i => i.id === draggedId);
      const toIdx = state.items.findIndex(i => i.id === targetId);
      if (fromIdx < 0 || toIdx < 0) return;
      const [moved] = state.items.splice(fromIdx, 1);
      state.items.splice(toIdx, 0, moved);
      saveItems();
      render();
    };
    // 드래그 핸들 - 모바일 터치 지원
    const handle = el.querySelector("[data-drag]");
    if (handle) {
      handle.ontouchstart = (e) => {
        e.preventDefault();
        el.classList.add("dragging");
        touchDrag = { id: el.dataset.id, el };
      };
    }
  });
  document.querySelectorAll("[data-check]").forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      e.preventDefault();
      const id = el.dataset.check;
      incrementCompleted(id);
      // 짧은 애니메이션 피드백 후 리렌더
      el.classList.add("done");
      setTimeout(() => render(), 200);
    };
  });
  document.querySelectorAll("[data-edit]").forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const id = el.dataset.edit;
      const item = state.items.find(i => i.id === id);
      if (!item) return;
      state.editingItem = item;
      state.addType = item.type;
      state.addStep = "form";
      state.showAddModal = true;
      renderAddModal();
    };
  });
  document.querySelectorAll("[data-delete]").forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const id = el.dataset.delete;
      const item = state.items.find(i => i.id === id);
      if (!item) return;
      state.deleteTarget = item;
      renderDeleteConfirm();
    };
  });

  if (state.showAddModal) renderAddModal();
  if (state.deleteTarget) renderDeleteConfirm();
}

function renderDeleteConfirm() {
  const existing = document.getElementById("delete-modal");
  if (existing) existing.remove();
  const item = state.deleteTarget;
  if (!item) return;

  const modal = document.createElement("div");
  modal.id = "delete-modal";
  modal.className = "modal-overlay";
  modal.innerHTML = `
    <div class="modal" style="max-width:340px">
      <div style="padding:24px 20px 16px;text-align:center">
        <p style="font-size:16px;color:#64748b;margin-bottom:8px">삭제하시겠어요?</p>
        <p style="font-size:20px;font-weight:700;color:#0f172a">${escapeHtml(item.name)}</p>
      </div>
      <div style="display:flex;gap:10px;padding:0 20px 20px">
        <button id="del-cancel" class="submit-btn" style="background:#e2e8f0;color:#0f172a;flex:1">취소</button>
        <button id="del-confirm" class="submit-btn" style="background:#ef4444;flex:1">삭제</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  const close = () => {
    state.deleteTarget = null;
    modal.remove();
  };
  document.getElementById("del-cancel").onclick = close;
  modal.onclick = (e) => { if (e.target === modal) close(); };
  document.getElementById("del-confirm").onclick = () => {
    state.items = state.items.filter(i => i.id !== item.id);
    delete state.completedToday[item.id];
    saveItems();
    saveCompletedToday(state.completedToday);
    close();
    render();
  };
}

function renderAddModal() {
  const existing = document.getElementById("add-modal");
  if (existing) existing.remove();

  const typeOptions = [
    { key: "set", label: "세트운동", desc: "x초 × x회 × x세트", icon: icons.repeat, cls: "set" },
    { key: "timer", label: "타이머", desc: "분/초 카운트다운", icon: icons.clock, cls: "timer" },
    { key: "simple", label: "일반", desc: "텍스트 + 체크박스", icon: icons.list, cls: "simple" },
  ];

  const modal = document.createElement("div");
  modal.id = "add-modal";
  modal.className = "modal-overlay";

  if (state.addStep === "select") {
    modal.innerHTML = `
      <div class="modal">
        <div class="modal-header">
          <div class="modal-header-left">
            <h2 class="modal-title">운동 종류 선택</h2>

            <button class="type-option" data-type="${opt.key}">
              <div class="type-option-icon list-item-icon ${opt.cls}">${opt.icon}</div>
              <div class="type-option-text">
                <p>${opt.label}</p>
                <p>${opt.desc}</p>
              </div>
            </button>
          `).join("")}
        </div>
      </div>
    `;
  } else {

    modal.innerHTML = `
      <div class="modal">
        <div class="modal-header">
          <div class="modal-header-left">
            ${isEditing ? "" : `<button class="back-btn" id="modal-back">${icons.chevronLeft}</button>`}
            <h2 class="modal-title">${isEditing ? "운동 수정" : "세부 설정"}</h2>
          </div>
          <button class="close-btn" id="modal-close">${icons.x}</button>
        </div>
        <div class="form">
          <div class="form-group">
            <label class="form-label">운동 이름</label>
            <input type="text" id="input-name" class="form-input" placeholder="예: 스쿼트" autofocus />
          </div>
          ${t === "set" ? `
            <div class="form-group">
              <label class="form-label">운동 시간 (초) <span style="color:#94a3b8;font-weight:400">— 1초씩 × 이 횟수</span></label>
              <div class="number-group">
                <button class="number-btn" data-adjust="duration" data-delta="-1">−</button>
                <input type="number" id="input-duration" class="form-input center" min="1" max="999" />
                <button class="number-btn" data-adjust="duration" data-delta="1">+</button>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">반복 간격 (초) <span style="color:#94a3b8;font-weight:400">— 1초 운동 사이 쉬기</span></label>
              <div class="number-group">
                <button class="number-btn" data-adjust="restBetweenReps" data-delta="-1">−</button>
                <input type="number" id="input-restBetweenReps" class="form-input center" min="0" max="999" />
                <button class="number-btn" data-adjust="restBetweenReps" data-delta="1">+</button>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">반복 횟수</label>
              <div class="number-group">
                <button class="number-btn" data-adjust="reps" data-delta="-1">−</button>
                <input type="number" id="input-reps" class="form-input center" min="1" max="999" />
                <button class="number-btn" data-adjust="reps" data-delta="1">+</button>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">세트 수</label>
              <div class="number-group">
                <button class="number-btn" data-adjust="sets" data-delta="-1">−</button>
                <input type="number" id="input-sets" class="form-input center" min="1" max="999" />
                <button class="number-btn" data-adjust="sets" data-delta="1">+</button>
              </div>
            </div>
            <div class="info-box orange" id="set-preview">값을 입력해주세요</div>
          ` : ""}
          ${t === "timer" ? `
            <div class="two-col">
              <div class="form-group">
                <label class="form-label">분</label>

                  <button class="number-btn" data-adjust="minutes" data-delta="-1">−</button>

  if (state.addStep === "select") {

    if (editing) {
      nameInput.value = editing.name || "";
      if (editing.type === "set") {
        const set = (id, v) => { const el = document.getElementById(id); if (el) el.value = v; };

        set("input-reps", editing.reps);
        set("input-sets", editing.sets);
        set("input-restBetweenReps", editing.restBetweenReps || 0);

        const total = editing.totalSec || 0;

    const checkCanSubmit = () => {

        const d = +(document.getElementById("input-duration")?.value);

        const s = +(document.getElementById("input-sets")?.value);
        submitBtn.disabled = !(d > 0 && r > 0 && s > 0);
      } else if (t === "timer") {
        const m = +(document.getElementById("input-minutes")?.value || 0);
        const s = +(document.getElementById("input-seconds")?.value || 0);
        submitBtn.disabled = !(m > 0 || s > 0);
      } else {
        submitBtn.disabled = false;
      }
    };
    nameInput.oninput = checkCanSubmit;

    // 숫자 조정 버튼
    document.querySelectorAll("[data-adjust]").forEach(btn => {
      btn.onclick = () => {
        const id = "input-" + btn.dataset.adjust;
        const delta = +btn.dataset.delta;
        const input = document.getElementById(id);
        const min = +input.min || 0;
        const max = +input.max || 999;
        input.value = Math.max(min, Math.min(max, (+input.value || 0) + delta));
        updateSetPreview();
        checkCanSubmit();
      };
    });

    // 모든 숫자 입력에 대해 프리뷰/버튼 상태 갱신
    ["input-duration", "input-reps", "input-sets", "input-restBetweenReps", "input-minutes", "input-seconds"].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.oninput = () => { updateSetPreview(); checkCanSubmit(); };
    });
    // 초기 프리뷰 업데이트
    updateSetPreview();

    // 저장
    submitBtn.onclick = () => {
      const name = nameInput.value.trim();
      if (!name) return;
      const t = state.addType;
      const isEdit = !!state.editingItem;
      let payload;
      if (t === "set") {
        const duration = +document.getElementById("input-duration").value;
        const reps = +document.getElementById("input-reps").value;
        const sets = +document.getElementById("input-sets").value;
        if (!(duration > 0 && reps > 0 && sets > 0)) return;
        payload = {
          name, type: t, duration, reps, sets,
          restBetweenReps: +document.getElementById("input-restBetweenReps").value || 0,
        };
      } else if (t === "timer") {
        const m = +document.getElementById("input-minutes").value || 0;
        const s = +document.getElementById("input-seconds").value || 0;
        if (m === 0 && s === 0) return;
        payload = { name, type: t, totalSec: m * 60 + s };
      } else {
        payload = { name, type: t };
      }
      if (isEdit) {
        const idx = state.items.findIndex(i => i.id === state.editingItem.id);
        if (idx >= 0) state.items[idx] = { ...state.editingItem, ...payload };
      } else {
        state.items.push({ id: Date.now().toString(), ...payload });
      }
      saveItems();
      closeModal();
      render();
    };
  }
}

function updateSetPreview() {
  const preview = document.getElementById("set-preview");
  if (!preview) return;
  const d = +document.getElementById("input-duration").value || 0;
  const r = +document.getElementById("input-reps").value || 0;
  const s = +document.getElementById("input-sets").value || 0;
  const rest = +document.getElementById("input-restBetweenReps").value || 0;
  if (!d || !r || !s) {
    preview.textContent = "값을 입력해주세요";
    return;
  }
  const repTotal = d * (1 + rest);
  preview.textContent = `1회 ${repTotal}초 (운동1초+간격${rest}초 × ${d}번) × ${r}회 × ${s}세트`;
}

function closeModal() {
  state.showAddModal = false;
  state.editingItem = null;
  state.addStep = "select";
  const m = document.getElementById("add-modal");
  if (m) m.remove();
}

// ============ 운동 실행 화면 ============
let exerciseState = null;
let exerciseInterval = null;

function renderActive() {
  const item = state.activeItem;
  if (item.type === "set") renderSetExercise();
  else if (item.type === "timer") renderTimer();
  else renderSimple();
}

function stopExercise() {
  if (exerciseInterval) { clearInterval(exerciseInterval); exerciseInterval = null; }
  if (window.speechSynthesis) window.speechSynthesis.cancel();
}

function exitActive() {
  stopExercise();
  exerciseState = null;
  state.activeItem = null;
  render();
}

// 완료 후 리스트 복귀 (진행중인 음성은 그대로 유지)
function exitAfterFinish() {
  if (exerciseInterval) { clearInterval(exerciseInterval); exerciseInterval = null; }
  exerciseState = null;
  state.activeItem = null;
  render();
}

// ---- 세트운동 ----
// 새 구조: 운동시간 = 운동 1초를 duration번 반복. 각 운동 1초 사이에 반복간격(rest)초.
// 1회 반복 총 시간 = duration * (1 + rest)
function getRepDuration(item) {
  const dur = item.duration || 0;
  const rest = item.restBetweenReps || 0;
  return dur * (1 + rest);
}

function renderSetExercise() {
  const item = state.activeItem;
  const repDur = getRepDuration(item);
  if (!exerciseState) {
    exerciseState = {
      running: false,
      currentSet: 1,
      currentRep: 1,
      timeLeft: repDur,
      phase: "exercise",  // "exercise" | "setBreak"
      finished: false,
    };
  }
  const s = exerciseState;

  // 세트 완료 대기 화면
  if (s.phase === "setBreak") {
    $app.innerHTML = `
      <div class="active-screen">
        <header class="active-header">
          <button class="active-header-btn" id="btn-exit">${icons.chevronLeft}</button>
          <h1>${escapeHtml(item.name)}</h1>
          <button class="active-header-btn" id="btn-reset">${icons.reset}</button>
        </header>
        <main class="active-main">
          <div class="done-screen">
            <div class="done-icon">${icons.check}</div>
            <p class="title">${s.currentSet}세트 완료!</p>
            <p class="subtitle">준비되면 다음 세트를 시작하세요</p>
            <p class="subtitle" style="margin-top:12px;font-size:14px">다음: ${s.currentSet + 1} / ${item.sets} 세트</p>
          </div>
        </main>
        <div class="big-btn-wrap">
          <button class="big-btn orange" id="btn-next-set">${icons.play} 다음 세트 시작</button>
        </div>
      </div>
    `;
    document.getElementById("btn-exit").onclick = exitActive;
    document.getElementById("btn-reset").onclick = () => {
      stopExercise();
      exerciseState = null;
      renderSetExercise();
    };
    document.getElementById("btn-next-set").onclick = startNextSet;
    return;
  }

  // 운동 화면
  const progress = repDur > 0 ? ((repDur - s.timeLeft) / repDur) * 100 : 0;
  const circumference = 2 * Math.PI * 45;
  const dashOffset = circumference * (1 - progress / 100);
  // 중앙 숫자: 지금이 몇 번째 "운동 1초"인지 (1 ~ duration)
  // 시작 대기(timeLeft === repDur) 상태에서는 0 표시
  const dur = item.duration || 0;
  const rest = item.restBetweenReps || 0;
  const cycle = 1 + rest;
  const elapsed = repDur - s.timeLeft; // 지난 초 (0부터 시작)
  const centerNum = elapsed === 0 ? 0 : Math.min(dur, Math.floor((elapsed - 1) / cycle) + 1);

  $app.innerHTML = `
    <div class="active-screen">
      <header class="active-header">
        <button class="active-header-btn" id="btn-exit">${icons.chevronLeft}</button>
        <h1>${escapeHtml(item.name)}</h1>
        <button class="active-header-btn" id="btn-reset">${icons.reset}</button>
      </header>
      <main class="active-main">
        ${s.finished ? `
          <div class="done-screen">
            <div class="done-icon">${icons.check}</div>
            <p class="title">완료!</p>
            <p class="subtitle">수고하셨습니다</p>
          </div>
        ` : `
          <div class="stats-row">
            <div>
              <p class="stats-label">세트</p>
              <p class="stats-value">${s.currentSet}<span class="total">/${item.sets}</span></p>
            </div>
            <div class="divider"></div>
            <div>
              <p class="stats-label">반복</p>
              <p class="stats-value">${s.currentRep}<span class="total">/${item.reps}</span></p>
            </div>
          </div>
          <div class="timer-circle">
            <svg viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="45" class="bg-ring" stroke-width="6" fill="none"/>
              <circle cx="50" cy="50" r="45" class="fg-ring-orange" stroke-width="6" fill="none"
                stroke-dasharray="${circumference}" stroke-dashoffset="${dashOffset}" stroke-linecap="round"/>
            </svg>
            <div class="time">${centerNum}</div>
          </div>
        `}
      </main>
      ${s.finished ? `
        <div class="big-btn-wrap">
          <button class="big-btn orange" id="btn-done">${icons.check} 리스트로</button>
        </div>
      ` : `
        <div class="big-btn-wrap">
          <button class="big-btn ${s.running ? "white" : "orange"}" id="btn-toggle">
            ${s.running ? icons.pause + " 일시정지" : icons.play + " 시작"}
          </button>
        </div>
      `}
    </div>
  `;

  document.getElementById("btn-exit").onclick = exitActive;
  document.getElementById("btn-reset").onclick = () => {
    stopExercise();
    exerciseState = null;
    renderSetExercise();
  };
  const toggleBtn = document.getElementById("btn-toggle");
  if (toggleBtn) toggleBtn.onclick = toggleSetExercise;
  const doneBtn = document.getElementById("btn-done");
  if (doneBtn) doneBtn.onclick = exitActive;
}

function toggleSetExercise() {
  getCtx();
  const s = exerciseState;
  const item = state.activeItem;
  const repDur = getRepDuration(item);

  if (s.running) {
    // 일시정지
    s.running = false;
    if (exerciseInterval) { clearInterval(exerciseInterval); exerciseInterval = null; }
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    cancelAlarm();
    saveBgTimer(null);
    renderSetExercise();
    return;
  }

  // 시작
  s.running = true;
  const say = (text) => { if (state.soundOn) speak(text); };

  // 백그라운드 보정: 현재 1회 반복 종료 시각 저장
  const totalRemaining = (item.reps - s.currentRep) * repDur + s.timeLeft +
    (item.sets - s.currentSet) * item.reps * repDur;
  const endTs = Date.now() + totalRemaining * 1000;
  saveBgTimer(endTs);
  scheduleAlarm(totalRemaining * 1000, item.name);

  // 세트의 첫 반복, 처음 시작일 때 안내
  if (s.currentRep === 1 && s.timeLeft === repDur) {
    say(`${s.currentSet}세트 시작`);
  }

  renderSetExercise();
  startTicking();
}

function startTicking() {
  const s = exerciseState;
  const item = state.activeItem;
  const repDur = getRepDuration(item);
  const play = (type) => { if (state.soundOn) sounds[type](); };
  const say = (text) => { if (state.soundOn) speak(text); };

  if (exerciseInterval) clearInterval(exerciseInterval);

  exerciseInterval = setInterval(() => {
    const dur = item.duration || 0;
    const rest = item.restBetweenReps || 0;
    const cycle = 1 + rest; // 운동1초 + 간격rest초
    // 현재 "이번 초"가 사이클 내에서 어느 위치인지 계산
    // timeLeft는 repDur부터 시작해 0까지 감소. 이번 초 = (repDur - timeLeft + 1)번째 초
    const elapsed = repDur - s.timeLeft + 1;
    const posInCycle = (elapsed - 1) % cycle; // 0이면 운동 구간 첫 초
    const exerciseCount = Math.floor((elapsed - 1) / cycle) + 1; // 1, 2, 3... (dur까지)

    if (posInCycle === 0 && exerciseCount >= 1 && exerciseCount <= dur) {
      // 운동 구간(1초) → 카운트 음성
      say(String(exerciseCount));
    }

    if (s.timeLeft <= 1) {
      // 1회 반복 완료
      if (s.currentRep < item.reps) {
        // 다음 반복
        s.currentRep++;
        s.timeLeft = repDur;
        play("repDone");
        setTimeout(() => say(`${s.currentRep}회`), 100);
      } else {
        // 이 세트의 마지막 반복 완료
        if (s.currentSet < item.sets) {
          // 세트 완료 → 수동 진행 대기
          play("setDone");
          setTimeout(() => say(`${s.currentSet}세트 완료. 다음 세트 시작 버튼을 눌러주세요`), 300);
          s.running = false;
          s.phase = "setBreak";
          clearInterval(exerciseInterval);
          exerciseInterval = null;
          renderSetExercise();
          return;
        } else {
          // 전체 완료
          play("allDone");
          s.running = false;
          s.finished = true;
          incrementCompleted(item.id);
          saveBgTimer(null);
          cancelAlarm();
          clearInterval(exerciseInterval);
          exerciseInterval = null;
          renderSetExercise();
          // "모두 완료" 음성이 끝난 뒤 리스트로 복귀
          setTimeout(() => {
            if (state.soundOn) {
              speak("모두 완료했습니다. 수고하셨습니다", () => {
                setTimeout(() => {
                  if (state.activeItem && state.activeItem.id === item.id) exitAfterFinish();
                }, 800);
              });
            } else {
              setTimeout(() => {
                if (state.activeItem && state.activeItem.id === item.id) exitAfterFinish();
              }, 2000);
            }
          }, 500);
          return;
        }
      }
    } else {
      s.timeLeft--;
    }
    renderSetExercise();
  }, 1000);
}

function startNextSet() {
  getCtx();
  const s = exerciseState;
  const item = state.activeItem;
  s.currentSet++;
  s.currentRep = 1;
  s.timeLeft = getRepDuration(item);
  s.phase = "exercise";
  s.running = true;
  if (state.soundOn) speak(`${s.currentSet}세트 시작`);
  renderSetExercise();
  startTicking();
}

// ---- 타이머 ----
function renderTimer() {
  const item = state.activeItem;
  if (!exerciseState) {
    exerciseState = { running: false, timeLeft: item.totalSec, finished: false };
  }
  const s = exerciseState;
  const m = Math.floor(s.timeLeft / 60);
  const sec = s.timeLeft % 60;
  const progress = ((item.totalSec - s.timeLeft) / item.totalSec) * 100;
  const circumference = 2 * Math.PI * 45;
  const dashOffset = circumference * (1 - progress / 100);

  $app.innerHTML = `
    <div class="active-screen">
      <header class="active-header">
        <button class="active-header-btn" id="btn-exit">${icons.chevronLeft}</button>
        <h1>${escapeHtml(item.name)}</h1>
        <button class="active-header-btn" id="btn-reset">${icons.reset}</button>
      </header>
      <main class="active-main">
        ${s.finished ? `
          <div class="done-screen">
            <div class="done-icon">${icons.check}</div>
            <p class="title">완료!</p>
          </div>
        ` : `
          <div class="timer-circle big">
            <svg viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="45" class="bg-ring" stroke-width="5" fill="none"/>
              <circle cx="50" cy="50" r="45" class="fg-ring-blue" stroke-width="5" fill="none"
                stroke-dasharray="${circumference}" stroke-dashoffset="${dashOffset}" stroke-linecap="round"/>
            </svg>
            <div class="time">${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}</div>
          </div>
        `}
      </main>
      ${s.finished ? `
        <div class="big-btn-wrap">
          <button class="big-btn blue" id="btn-done">${icons.check} 리스트로</button>
        </div>
      ` : `
        <div class="big-btn-wrap">
          <button class="big-btn ${s.running ? "white" : "blue"}" id="btn-toggle">
            ${s.running ? icons.pause + " 일시정지" : icons.play + " 시작"}
          </button>
        </div>
      `}
    </div>
  `;

  document.getElementById("btn-exit").onclick = exitActive;
  document.getElementById("btn-reset").onclick = () => {
    stopExercise();
    exerciseState = null;
    renderTimer();
  };
  const toggleBtn = document.getElementById("btn-toggle");
  if (toggleBtn) toggleBtn.onclick = toggleTimer;
  const doneBtn = document.getElementById("btn-done");
  if (doneBtn) doneBtn.onclick = exitActive;
}

function toggleTimer() {
  getCtx();
  const s = exerciseState;
  const item = state.activeItem;
  const play = (type) => { if (state.soundOn) sounds[type](); };
  const say = (text) => { if (state.soundOn) speak(text); };

  if (s.running) {
    s.running = false;
    if (exerciseInterval) { clearInterval(exerciseInterval); exerciseInterval = null; }
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    cancelAlarm();
    saveBgTimer(null);
    renderTimer();
    return;
  }

  s.running = true;
  say("시작");
  // 백그라운드 보정용 종료 시각 저장 + 알림 예약
  const endTs = Date.now() + s.timeLeft * 1000;
  saveBgTimer(endTs);
  scheduleAlarm(s.timeLeft * 1000, item.name);
  renderTimer();

  exerciseInterval = setInterval(() => {
    if (s.timeLeft === 4) say("3");
    else if (s.timeLeft === 3) say("2");
    else if (s.timeLeft === 2) say("1");

    if (s.timeLeft <= 1) {
      play("allDone");
      s.running = false;
      s.finished = true;
      incrementCompleted(item.id);
      saveBgTimer(null);
      clearInterval(exerciseInterval);
      exerciseInterval = null;
      renderTimer();
      // "완료" 음성이 완전히 끝난 뒤에 리스트로 복귀
      setTimeout(() => {
        if (state.soundOn) {
          speak("완료", () => {
            setTimeout(() => {
              if (state.activeItem && state.activeItem.id === item.id) exitAfterFinish();
            }, 600);
          });
        } else {
          setTimeout(() => {
            if (state.activeItem && state.activeItem.id === item.id) exitAfterFinish();
          }, 1500);
        }
      }, 400);
      return;
    } else {
      s.timeLeft--;
    }
    renderTimer();
  }, 1000);
}

// ---- 일반 체크 ----
function renderSimple() {
  const item = state.activeItem;
  const key = `rehab_check_${item.id}`;
  if (!exerciseState) {
    exerciseState = { checked: storage.get(key) || false };
  }
  const s = exerciseState;

  $app.innerHTML = `
    <div class="active-screen simple">
      <header class="active-header simple">
        <button class="active-header-btn simple" id="btn-exit">${icons.chevronLeft}</button>
        <h1>${escapeHtml(item.name)}</h1>
      </header>
      <main class="active-main" style="color:#0f172a">
        <div class="simple-display">
          <div class="simple-circle ${s.checked ? "checked" : "unchecked"}">
            ${s.checked ? icons.check : icons.list}
          </div>
          <p class="name">${escapeHtml(item.name)}</p>
          <p class="status">${s.checked ? "완료됨" : "버튼을 눌러 완료 표시"}</p>
        </div>
      </main>
      <div class="big-btn-wrap">
        <button class="big-btn ${s.checked ? "bordered" : "green"}" id="btn-toggle">
          ${s.checked ? icons.x + " 완료 취소" : icons.check + " 완료"}
        </button>
      </div>
    </div>
  `;

  document.getElementById("btn-exit").onclick = exitActive;
  document.getElementById("btn-toggle").onclick = () => {
    getCtx();
    const wasChecked = s.checked;
    s.checked = !s.checked;
    if (state.soundOn && s.checked) sounds.repDone();
    storage.set(key, s.checked);
    // 체크 OFF → ON 순간에만 카운트 증가 + 자동 복귀
    if (!wasChecked && s.checked) {
      incrementCompleted(item.id);
      setTimeout(() => { if (state.activeItem && state.activeItem.id === item.id) exitAfterFinish(); }, 1500);
    }
    renderSimple();
  };
}

// ============ 유틸 ============
function escapeHtml(text) {
  if (text == null) return "";
  return String(text).replace(/[&<>"']/g, c => ({
    "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;"
  }[c]));
}

// 초기 렌더
render();

// ============ PWA: Service Worker 등록 ============
let swReg = null;
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js").then(reg => {
    swReg = reg;
    console.log("[PWA] SW 등록 완료");
  }).catch(e => console.warn("[PWA] SW 등록 실패:", e));
}

// 알림 권한 요청 (첫 실행 시)
function requestNotificationPermission() {
  if (!("Notification" in window)) return;
  if (Notification.permission === "default") {
    Notification.requestPermission();
  }
}
// 앱 시작 1초 후 권한 요청
setTimeout(requestNotificationPermission, 1000);

// ============ 타이머 완료 알림 예약 ============
// 타이머 시작 시 SW에 delayMs 전달 → 백그라운드에서도 알림 발생
function scheduleAlarm(delayMs, name) {
  if (!swReg || Notification.permission !== "granted") return;
  swReg.active && swReg.active.postMessage({
    type: "SCHEDULE_ALARM",
    delayMs,
    title: "운동 완료!",
    body: `${name} 운동이 끝났어요 💪`,
  });
}
function cancelAlarm() {
  if (!swReg || !swReg.active) return;
  swReg.active.postMessage({ type: "CANCEL_ALARM" });
}

// ============ 백그라운드 타이머 보정 ============
// 타이머/세트운동 시작 시 localStorage에 종료 예정 시각 저장
// visibilitychange로 앱 복귀 시 경과 시간 계산해서 보정
const BG_KEY = "rehab_bg_timer";
function saveBgTimer(endTimestamp) {
  if (endTimestamp) localStorage.setItem(BG_KEY, String(endTimestamp));
  else localStorage.removeItem(BG_KEY);
}
function loadBgTimer() {
  const v = localStorage.getItem(BG_KEY);
  return v ? parseInt(v, 10) : null;
}

document.addEventListener("visibilitychange", () => {
  if (document.visibilityState !== "visible") return;
  if (!exerciseState || !state.activeItem) return;

  const endTs = loadBgTimer();
  if (!endTs) return;

  const item = state.activeItem;
  const now = Date.now();
  const remaining = Math.max(0, Math.round((endTs - now) / 1000));

  if (item.type === "timer") {
    if (exerciseState.running) {
      if (remaining <= 0) {
        // 백그라운드에서 이미 끝남 → 완료 처리
        clearInterval(exerciseInterval);
        exerciseInterval = null;
        exerciseState.running = false;
        exerciseState.finished = true;
        exerciseState.timeLeft = 0;
        incrementCompleted(item.id);
        saveBgTimer(null);
        setTimeout(() => { if (state.activeItem?.id === item.id) exitAfterFinish(); }, 1000);
      } else {
        exerciseState.timeLeft = remaining;
      }
      render();
    }
  } else if (item.type === "set") {
    if (exerciseState.running) {
      if (remaining <= 0) {
        clearInterval(exerciseInterval);
        exerciseInterval = null;
        exerciseState.running = false;
        exerciseState.finished = true;
        incrementCompleted(item.id);
        saveBgTimer(null);
        setTimeout(() => { if (state.activeItem?.id === item.id) exitAfterFinish(); }, 1000);
      } else {
        exerciseState.timeLeft = remaining;
      }
      render();
    }
  }
});
</script>
</body>
</html>
